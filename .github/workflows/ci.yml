name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint scripts
        run: shellcheck -x --severity=warning scripts/*.sh tests/run_tests.sh frost.tmux

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get install -y tmux
      - name: Run tests
        run: ./tests/run_tests.sh
